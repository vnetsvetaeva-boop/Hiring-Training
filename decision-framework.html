<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Bai Jamjuree',sans-serif;background:#fff;color:#000;padding:20px 28px;line-height:1.5;max-width:100%;margin:0 auto}

.header{background:linear-gradient(135deg,#80EAFF 0%,#50D0ED 100%);border-radius:12px;padding:22px 26px 18px;margin-bottom:24px}
.header-eyebrow{font-size:.75rem;font-weight:600;color:rgba(0,60,80,.5);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px}
.header-title{font-size:28px;font-weight:700;color:#0A3D4F;line-height:1.2}
.header-sub{font-size:16px;color:rgba(0,60,80,.55);margin-top:6px}

.scenarios{display:flex;flex-direction:column;gap:12px}

.card{border:2px solid #ecedea;border-radius:10px;background:#fff;cursor:pointer;transition:all .25s ease;overflow:hidden}
.card:hover{border-color:#b0e8f7;box-shadow:0 2px 12px rgba(128,234,255,.12)}
.card.active{border-color:#50D0ED;box-shadow:0 4px 20px rgba(128,234,255,.25)}

.card-top{display:flex;align-items:center;gap:14px;padding:16px 18px}
.card.active .card-top{background:linear-gradient(135deg,#80EAFF 0%,#50D0ED 100%)}

.card-icon{font-size:28px;flex-shrink:0}
.card-info{flex:1}
.card-title{font-size:18px;font-weight:700;color:#000;line-height:1.3}
.card.active .card-title{color:#0A3D4F}
.card-subtitle{font-size:13px;color:#777;margin-top:2px}
.card.active .card-subtitle{color:rgba(0,60,80,.55)}

.card-arrow{font-size:18px;color:#ccc;transition:transform .25s;flex-shrink:0}
.card.active .card-arrow{transform:rotate(90deg);color:#0A3D4F}

.card-body{max-height:0;overflow:hidden;transition:max-height .45s ease,padding .3s ease;padding:0 18px}
.card.active .card-body{max-height:2000px;padding:0 18px 20px}

.divider{height:1px;background:#ecedea;margin-bottom:16px}

.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:rgba(0,60,80,.45);margin-bottom:8px;margin-top:16px}
.section-label:first-child{margin-top:0}

.examples{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.example-tag{font-size:13px;font-weight:600;background:#f4f4f3;color:#555;padding:4px 10px;border-radius:6px}

.text-item{font-size:15px;color:#333;font-weight:500;line-height:1.55;padding:3px 0 3px 20px;position:relative}
.text-item::before{content:'\2192';position:absolute;left:0;color:#50D0ED;font-weight:700}

.approach-block{background:#f7f7f5;border-radius:10px;padding:14px 16px;margin-top:10px}
.approach-title{font-size:14px;font-weight:700;color:#0A3D4F;margin-bottom:6px}
.approach-item{font-size:14px;color:#444;font-weight:500;line-height:1.55;padding:2px 0 2px 18px;position:relative}
.approach-item::before{content:'\2022';position:absolute;left:4px;color:#50D0ED;font-weight:700}

.cost-note{font-size:13px;font-weight:600;color:#92400E;background:#FEF9C3;display:inline-block;padding:3px 10px;border-radius:5px;margin-top:6px}

.tip-block{background:#f7f7f5;border-left:4px solid #80EAFF;border-radius:0 10px 10px 0;padding:14px 16px;margin-top:14px}
.tip-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(0,60,80,.45);margin-bottom:6px}
.tip-item{font-size:14px;color:#555;font-weight:500;line-height:1.55;padding:3px 0 3px 20px;position:relative}
.tip-item::before{content:'?';position:absolute;left:2px;color:#50D0ED;font-weight:700;font-size:13px}

.result-block{background:#E0F7FF;border-radius:8px;padding:12px 16px;margin-top:12px}
.result-text{font-size:14px;font-weight:600;color:#0E7490;line-height:1.5}

@media(max-width:580px){
  .examples{flex-direction:column}
  .card-top{gap:10px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Sourcing strategy</div>
  <div class="header-title">Common Sourcing Scenarios</div>
  <div class="header-sub">Click each scenario to see examples, typical approaches, and questions to guide your decision</div>
</div>

<div class="scenarios" id="scenarios"></div>

<script>
var DATA=[
  {
    icon:"\uD83D\uDFE2",
    title:"Standard Role, Not Urgent",
    subtitle:"Common skills, active job market, flexible timeline",
    examples:["Junior Developer","Marketing Coordinator","Customer Support Rep","Account Manager"],
    looks:[
      "Common skills in active job market",
      "Good applicant flow expected"
    ],
    approaches:[
      {
        title:"What many managers do:",
        items:[
          "Post the job and review applicants",
          "Supplement with employee referrals"
        ],
        cost:null
      }
    ],
    questions:[
      "Are these skills common in the job market?"
    ],
    result:"If yes to most \u2192 Starting with just posting on internal career site and external job board is reasonable"
  },
  {
    icon:"\uD83D\uDFE1",
    title:"Specialized Skills or Passive Talent Needed",
    subtitle:"Niche skill combinations, candidates may not be actively looking",
    examples:["Senior Backend Engineer (specific tech stack)","Product Manager with gaming + B2B experience","Data Scientist with ML experience","Senior Designer with gaming portfolio"],
    looks:[
      "Specialized skill combinations",
      "Best candidates may not be actively job searching",
      "Moderate timeline (30\u201360 days)",
      "You have some bandwidth for active sourcing"
    ],
    approaches:[
      {
        title:"Option A: Post + LinkedIn Recruiter",
        items:[
          "Reach passive candidates who aren\u2019t actively looking",
          "Requires your time: 3\u20135 hours/week"
        ],
        cost:null
      },
      {
        title:"Option B: Post + Agency",
        items:[
          "Agency sources passive candidates",
          "You focus on interviewing"
        ],
        cost:"Agency fee from your department budget"
      }
    ],
    questions:[
      "Do I have 3\u20135 hours/week to source on LinkedIn?",
      "Or would I rather outsource sourcing to an agency?",
      "What does my manager approve budget-wise?"
    ],
    result:null
  },
  {
    icon:"\uD83D\uDD34",
    title:"Urgent Need",
    subtitle:"Must fill in <30 days, high business impact",
    examples:["Critical backfill (someone just quit, team blocked)","Product launch dependency (hard deadline)","Compliance/regulatory requirement (must fill by date)","Senior/executive role (VP+, C-suite)"],
    looks:[
      "Must fill in <30 days",
      "High business impact if role stays vacant",
      "Can\u2019t wait for organic applicant flow"
    ],
    approaches:[
      {
        title:"If skills are common (e.g., Support Manager, Account Manager):",
        items:[
          "Post + Agency to accelerate search"
        ],
        cost:"Agency fee from your department budget"
      },
      {
        title:"If skills are specialized (e.g., VP Engineering, Blockchain Architect):",
        items:[
          "Agency as primary approach",
          "They have specialized networks for niche + urgent combinations"
        ],
        cost:"Agency fee from your department budget"
      },
      {
        title:"Alternative (if you have strong network + bandwidth):",
        items:[
          "LinkedIn Recruiter sourcing",
          "Requires significant time investment"
        ],
        cost:null
      }
    ],
    questions:[
      "What\u2019s the business cost of this role being vacant another month?",
      "Do I have manager approval for agency budget?",
      "Do I have a strong existing network in this space?",
      "Am I realistically able to source often?"
    ],
    result:null
  }
];

var sel=null;

function render(){
  var el=document.getElementById('scenarios');
  el.innerHTML=DATA.map(function(d,i){
    var isActive=sel===i;

    var examplesHtml=d.examples.map(function(e){return '<span class="example-tag">'+e+'</span>'}).join('');

    var looksHtml=d.looks.map(function(l){return '<div class="text-item">'+l+'</div>'}).join('');

    var approachesHtml=d.approaches.map(function(a){
      var items=a.items.map(function(it){return '<div class="approach-item">'+it+'</div>'}).join('');
      var costHtml=a.cost?'<div class="cost-note">'+a.cost+'</div>':'';
      return '<div class="approach-block"><div class="approach-title">'+a.title+'</div>'+items+costHtml+'</div>';
    }).join('');

    var questionsHtml=d.questions.map(function(q){return '<div class="tip-item">'+q+'</div>'}).join('');

    var resultHtml=d.result?'<div class="result-block"><div class="result-text">'+d.result+'</div></div>':'';

    return '<div class="card'+(isActive?' active':'')+'" data-idx="'+i+'">'+
      '<div class="card-top">'+
        '<div class="card-icon">'+d.icon+'</div>'+
        '<div class="card-info">'+
          '<div class="card-title">'+d.title+'</div>'+
          '<div class="card-subtitle">'+d.subtitle+'</div>'+
        '</div>'+
        '<div class="card-arrow">\u203A</div>'+
      '</div>'+
      '<div class="card-body">'+
        '<div class="divider"></div>'+
        '<div class="section-label">Example roles</div>'+
        '<div class="examples">'+examplesHtml+'</div>'+
        '<div class="section-label">What this typically looks like</div>'+
        looksHtml+
        '<div class="section-label">Approaches</div>'+
        approachesHtml+
        '<div class="tip-block">'+
          '<div class="tip-label">Questions to ask yourself</div>'+
          questionsHtml+
        '</div>'+
        resultHtml+
      '</div>'+
    '</div>';
  }).join('');

  el.querySelectorAll('.card').forEach(function(c){
    c.addEventListener('click',function(){
      var idx=parseInt(c.dataset.idx);
      sel=sel===idx?null:idx;
      render();
    });
  });
}

render();
</script>
</body>
</html>
